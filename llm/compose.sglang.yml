# https://docs.sglang.io/docs/get-started/install#method-5-using-docker-compose

services:
  sglang:
    image: lmsysorg/sglang:latest-runtime
    container_name: sglang
    restart: unless-stopped
    ports:
      - ${SGLANG_PORT:-30000}:${SGLANG_PORT:-30000}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-../data}/huggingface:/root/.cache/huggingface
      - ${CONFIG_DIR:-../configs}/sglang:/sgl-workspace/configs
    ipc: host
    gpus: all
    env_file:
      - path: ../.env
        required: false
    entrypoint: python3 -m sglang.launch_server
    command:
      - --host
      - 0.0.0.0
      - --port
      - ${SGLANG_PORT:-30000}
      - --config
      - /sgl-workspace/configs/cuda.yml
