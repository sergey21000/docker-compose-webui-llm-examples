# https://github.com/ggml-org/llama.cpp/blob/master/docs/docker.md

services:
  llamacpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llamacpp
    restart: unless-stopped
    gpus: all
    ports:
      - ${LLAMA_ARG_PORT:-8080}:${LLAMA_ARG_PORT:-8080}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-../data}/huggingface/hub:/models
      - ${DOCKER_VOLUME_STORAGE:-../data}/huggingface/hub:/root/.cache/llama.cpp/
      - ${DOCKER_VOLUME_STORAGE:-../data}/huggingface/hub:/root/.cache/huggingface/hub
    env_file:
      - path: ../.env
        required: true
