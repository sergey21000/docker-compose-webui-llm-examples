services:
  infinity:
    build:
      context: ../services
      dockerfile: infinity.Dockerfile
      args:
        BASE_IMAGE: michaelf34/infinity:latest
    image: local/infinity-updated:latest
    container_name: infinity
    restart: unless-stopped
    gpus: all
    ports:
      - ${INFINITY_PORT:-7997}:${INFINITY_PORT:-7997}
    volumes:
      - ${DOCKER_VOLUME_STORAGE:-../data}/huggingface:/app/.cache/huggingface
    environment:
      - HF_HUB_OFFLINE=0
    env_file:
      - path: ../.env
        required: true
    command:
      - v2
