# https://docs.sglang.io/docs/get-started/install#method-5-using-docker-compose

services:
  sglang:
    extends:
      file: ../llm/compose.sglang.yml
      service: sglang
    image: ghcr.io/sergey21000/sglang-cpu:latest
    gpus: !reset null
    command:
      - python3
      - -m
      - sglang.launch_server
      - --host
      - 0.0.0.0
      - --port
      - ${SGLANG_PORT:-30000}
      - --config
      - /sgl-workspace/configs/cpu.yml
